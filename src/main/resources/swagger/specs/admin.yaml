openapi: 3.0.3
info:
  title: EMS Admin API
  version: 1.0.0
  description: Endpoints accessible to ADMIN users for user, team, and event oversight.
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
tags:
  - name: admin-users
    description: Administrative user management.
  - name: admin-teams
    description: Administrative team management.
  - name: admin-events
    description: Administrative event visibility.
paths:
  /api/admin/users:
    get:
      tags: [admin-users]
      summary: List all users
      operationId: adminListUsers
      responses:
        '200':
          description: Users in the system.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
    post:
      tags: [admin-users]
      summary: Create a managed user
      operationId: adminCreateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateManagedUserRequest'
      responses:
        '200':
          description: User created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/users/search/email:
    get:
      tags: [admin-users]
      summary: Search user by email
      operationId: adminGetUserByEmail
      parameters:
        - in: query
          name: email
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: Matching user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/users/search/phone:
    get:
      tags: [admin-users]
      summary: Search user by phone
      operationId: adminGetUserByPhone
      parameters:
        - in: query
          name: phone
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Matching user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/users/{id}:
    get:
      tags: [admin-users]
      summary: Get user by id
      operationId: adminGetUserById
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
    put:
      tags: [admin-users]
      summary: Update user
      operationId: adminUpdateUser
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [admin-users]
      summary: Delete user
      operationId: adminDeleteUser
      parameters:
        - $ref: '#/components/parameters/Id'
      responses:
        '200':
          description: User deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMessageResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/users/{id}/role:
    put:
      tags: [admin-users]
      summary: Change user role
      operationId: adminChangeUserRole
      parameters:
        - $ref: '#/components/parameters/Id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangeUserRoleRequest'
      responses:
        '200':
          description: User role changed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/teams/{teamId}:
    get:
      tags: [admin-teams]
      summary: Get team by id
      operationId: adminGetTeamById
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        default:
          $ref: '#/components/responses/Error'
    delete:
      tags: [admin-teams]
      summary: Delete team
      operationId: adminDeleteTeam
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team deleted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMessageResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/teams/{teamId}/members:
    get:
      tags: [admin-teams]
      summary: List team members
      operationId: adminListTeamMembers
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team members.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/teams/{teamId}/requests:
    get:
      tags: [admin-teams]
      summary: List team membership requests
      operationId: adminListTeamMembershipRequests
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team membership requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMembershipResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/teams/{teamId}/owner/{userId}:
    put:
      tags: [admin-teams]
      summary: Transfer team ownership
      operationId: adminTransferTeamOwnership
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: Ownership transferred.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/teams/{teamId}/members/{userId}:
    delete:
      tags: [admin-teams]
      summary: Remove user from team
      operationId: adminRemoveUserFromTeam
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User removed from team.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminMessageResponse'
        default:
          $ref: '#/components/responses/Error'
  /api/admin/events:
    get:
      tags: [admin-events]
      summary: List all events
      operationId: adminListEvents
      responses:
        '200':
          description: Events in the system.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventResponse'
        default:
          $ref: '#/components/responses/Error'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema:
        type: integer
        format: int64
    TeamId:
      in: path
      name: teamId
      required: true
      schema:
        type: integer
        format: int64
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: integer
        format: int64
  responses:
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorResponse'
  schemas:
    Role:
      type: string
      enum: [USER, MODERATOR, ADMIN]
    EventType:
      type: string
      enum: [SOLO, TEAM]
    EventVisibility:
      type: string
      enum: [PRIVATE, PUBLIC]
    EventStatus:
      type: string
      enum: [DRAFT, PUBLISHED, COMPLETED, CANCELLED]
    RequestStatus:
      type: string
      enum: [PENDING, APPROVED, REJECTED, CANCELLED]
    CreateManagedUserRequest:
      type: object
      required: [name, email, password, role, phone]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          format: password
        role:
          $ref: '#/components/schemas/Role'
        phone:
          type: string
    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
        role:
          $ref: '#/components/schemas/Role'
    ChangeUserRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/Role'
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        email:
          type: string
          format: email
        name:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        emailVerified:
          type: boolean
        phoneVerified:
          type: boolean
    TeamResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        ownerId:
          type: integer
          format: int64
        eventId:
          type: integer
          format: int64
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    TeamMembershipResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        teamId:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/RequestStatus'
    EventResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        createdBy:
          type: integer
          format: int64
        type:
          $ref: '#/components/schemas/EventType'
        visibility:
          $ref: '#/components/schemas/EventVisibility'
        status:
          $ref: '#/components/schemas/EventStatus'
        maxParticipants:
          type: integer
          minimum: 1
        minTeamSize:
          type: integer
          minimum: 1
          nullable: true
        maxTeamSize:
          type: integer
          minimum: 1
          nullable: true
        registrationFee:
          type: number
          format: double
          minimum: 0
        registrationDeadline:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
          nullable: true
    AdminMessageResponse:
      type: object
      properties:
        message:
          type: string
    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        code:
          type: string
        message:
          type: string
        path:
          type: string
          nullable: true
        details:
          type: array
          items:
            type: string
