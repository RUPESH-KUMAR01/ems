---
logging:
  level: INFO
  loggers:
    com.rupesh.ems: DEBUG
database:
  driverClass: org.postgresql.Driver

  user: postgres
  password: postgres

  url: jdbc:postgresql://localhost:5433/ems

  properties:
    charSet: UTF-8

  maxWaitForConnection: 1s
  validationQuery: "SELECT 1"

  minSize: 8
  maxSize: 32

jwt:
  secret: "super-secret-key"
  expireInMilliSec: 3600000

bootstrapadmin:
  name: "admin"
  email: "admin@ems.com"
  password: "super-secret"