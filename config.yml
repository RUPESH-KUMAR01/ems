---
logging:
  level: INFO
  loggers:
    com.rupesh.ems: DEBUG
    org.hibernate.SQL: DEBUG
  appenders:
    - type: console
      threshold: ALL
      timeZone: UTC
      logFormat: "%-5level [%d{yyyy-MM-dd HH:mm:ss.SSS,UTC}] [%thread] %logger{30}: %message%n"
    - type: file
      currentLogFilename: ./target/ems.log
      archivedLogFilenamePattern: ./target/ems-%d.log.gz
      archivedFileCount: 5
      timeZone: UTC
      logFormat: "%-5level [%d{yyyy-MM-dd HH:mm:ss.SSS,UTC}] [%thread] %logger{30}: %message%n"
database:
  driverClass: org.postgresql.Driver

  user: postgres
  password: postgres

  url: jdbc:postgresql://localhost:5433/ems

  properties:
    charSet: UTF-8
    hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate.hbm2ddl.auto: update
    hibernate.show_sql: true
    hibernate.format_sql: true
  maxWaitForConnection: 1s
  validationQuery: "SELECT 1"

  minSize: 8
  maxSize: 32

jwt:
  secret: "super-secret-key"
  expireInMilliSec: 3600000

bootstrapadmin:
  enabled: true
  name: "admin"
  email: "admin@ems.com"
  phone: "123"
  password: "super-secret"

emailservice:
  username: "admin@ems.com"
  password: "ems123@"

razorpay:
  keyId: "rzp_test_YOUR_KEY_ID"
  keySecret: "YOUR_KEY_SECRET"
  webhookSecret: "YOUR_WEBHOOK_SECRET"
